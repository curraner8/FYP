name: "Web Vulnerability Scanner"
description: "Scans source code for security vulnerabilities and generates a report with fix recommendations"
author: "Sean Curran"

inputs:
  scan-path:
    description: "Path to scan"
    required: false
    default: "."
  fail-on-grade:
    description: "Fail the action if score falls below this grade (A/B/C/D/E/F)"
    required: false
    default: "D"
  groq-api-key:
    description: "Groq API key for LLM fix suggestions"
    required: false
    default: ""

outputs:
  score:
    description: "Numerical security score (0-100)"
  grade:
    description: "Letter grade (A-F)"
  files_with_issues:
    description: "Number of files with issues"
  critical:
    description: "Critical penalty points"
  high:
    description: "High penalty points"
  medium:
    description: "Medium penalty points"
  low:
    description: "Low penalty points"

runs:
  using: "docker"
  image: "Dockerfile"
  env:
    GROQ_API_KEY: ${{ inputs.groq-api-key }}
    FAIL_ON_GRADE: ${{ inputs.fail-on-grade }}
  args:
    - ${{ inputs.scan-path }}
